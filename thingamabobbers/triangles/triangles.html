<!DOCTYPE HTML>
<html lang="en">
	<head>
	<Title>"Triangle Trouble!"</TITLE>

		<!--
		GLSL is the language used for shaders (GL Shader Language)
		Attribute - you specify how to pull the data out of the buffers you supply.
		Buffers - Data loaded onto the GPU (Normally vertex information)
		Uniforms - global variables (in GLSL) that you set before you run the shader program
		Textures - Textures are arrays of data you can randomly acces in your shader program.
		Varying - are way for a vertex shader to pass data to the fragmentShader.
		-->
		<script id="2dVertexShader" type="notjs">
		attribute vec4 a_position;
		attribute vec3 a_color;
		varying vec3 v_color;
		void main()
		{
			v_color = a_color;
			gl_Position = a_position;
		}
		</SCRIPT>

		<script id="2dFragmentShader" type="notjs">
		//Fragment shaders do not have precision so we have to set it.
		precision mediump float;
		varying vec3 v_color;
		void main()
		{
			gl_FragColor = vec4(v_color,1); //Between 0 and 1.
		}
		</script>

		<script>
		class InitWebGLProgram
		{
			constructor()
			{
				// setup our viewport
				gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
				gl.clearColor(1, 1, 1, 1);
				gl.clear(gl.COLOR_BUFFER_BIT);
			}
			createShader(type,source)
			{
				let shader = gl.createShader(type);
				gl.shaderSource(shader, source);
				gl.compileShader(shader);
				let success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
				if (success) {
					return shader;
				}
				// Else it didn't work
				console.error(gl.getShaderInfoLog(shader));
				gl.deleteShader(shader);
			}

			createProgram(vs, fs)
			{
				let program = gl.createProgram();
				gl.attachShader(program, vs);
				gl.attachShader(program, fs);
				gl.linkProgram(program);
				let success = gl.getProgramParameter(program, gl.LINK_STATUS);
				if (success) {
					return program;
				}
				console.error(gl.getProgramInfoLog(program));
				gl.deleteProgram(program);
			}
		}

		class Shape
		{
			constructor()
			{

				// Now we have to explain to GLSL how to interpret our data
				// Find the position attribute location in the program
				// 2nd create a position buffer
				// 3rd create a
				let positions = [
					0, 0.5, 1, 0, 0,
					1, 0.5, 1, 1, 0,
					0.5, 1, 0, 1, 0,
					0.5, 0, 0, 1, 1,
					0, -1, 0, 0, 1,
					-0.5, 0, 1, 0, 1,
				];
				// Create a position buffer
				this.positionBuffer = gl.createBuffer()
				// Bind "ARRAY_BUFFER type to the positionBuffer"
				gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
				gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
			}
			render(program)
			{
				// Now we have to find the attribute position in the program
				let positionAttributeLocation = gl.getAttribLocation(program, "a_position");
				let colorAttributeLocation = gl.getAttribLocation(program, "a_color");

				// Now we specify HOW TO read our vertices
				gl.enableVertexAttribArray(positionAttributeLocation);
				gl.enableVertexAttribArray(colorAttributeLocation);

				gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);

				gl.vertexAttribPointer(
					positionAttributeLocation,
					2, // Size
					gl.FLOAT, // Type
					false, // Normalize
					5 * 4, // Stride
					0 * 4, // Offset
				);

				gl.vertexAttribPointer(
					colorAttributeLocation,
					3, // Size
					gl.FLOAT, // Type
					false, // Normalize
					5 * 4, // Stride
					2 * 4, // Offset
				)

				// Convert shape style ID to gl primitive type
				let styles = [gl.TRIANGLES, gl.TRIANGLE_STRIP, gl.TRIANGLE_FAN];

				let primitiveType = styles[this.style];
				let offset = 0;
				let count = 6;
				gl.drawArrays(primitiveType, offset, count);
			}
		}


		class main
		{
			constructor()
			{
				this.webGL = new InitWebGLProgram();
				let vertexShaderSource = document.getElementById("2dVertexShader").text;
				let fragmentShaderSource = document.getElementById("2dFragmentShader").text;
				let vertexShader = this.webGL.createShader(gl.VERTEX_SHADER, vertexShaderSource);
				let fragmentShader = this.webGL.createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);
				// Link to program
				this.program = this.webGL.createProgram(vertexShader, fragmentShader);
				// what progbram to use;
				gl.useProgram(this.program);
				this.mainShape = new Shape();
				this.mainShape.style = 0;
				this.render();
			}

			changeShapeStyle(newStyle) {
				this.mainShape.style = newStyle
			}

			render() {
				this.mainShape.render(this.program);
			}
		}

		function update(style) {
			m.changeShapeStyle(style)
			gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
			m.render();
		}
		</script>
	</head>
	<body>
		<header>
			<button onclick="update(0)">Triangles</button>
			<button onclick="update(1)">Triangle Strip</button>
			<button onclick="update(2)">Triangle Fan</button>
		</header>

		<canvas id="myCanvas" width="640" height="400">
			Your browser does not support canvas.
		</canvas>

		<footer>

		</footer>
		<script>
			const canvas = document.getElementById("myCanvas");
			const gl = canvas.getContext("webgl");

			const m = new main();
		</script>
	</body>
</html>
